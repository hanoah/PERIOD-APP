<!DOCTYPE html>
<html lang="en" data-mode="neutral" data-palette="neutral" data-dark="false">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="var(--color-primary, #6366f1)">
  <meta name="description" content="Private period tracker. Your data stays on your device.">
  <title>Period Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/themes/palettes.css">
  <link rel="stylesheet" href="css/themes/modes.css">
  <link rel="stylesheet" href="css/print.css">
</head>
<body>
  <div id="app">
    <!-- Content injected by app.js based on route -->
    <main id="main" role="main"></main>
  </div>

  <!-- Nav bar (hidden on onboarding) -->
  <nav id="nav" class="nav" aria-label="Main navigation" hidden>
    <a href="#/" class="nav-link" aria-current="page" data-route="/">
      <span class="nav-icon" aria-hidden="true">⌂</span>
      <span class="nav-label">Home</span>
    </a>
    <a href="#/stats" class="nav-link" data-route="/stats">
      <span class="nav-icon" aria-hidden="true">▤</span>
      <span class="nav-label">Stats</span>
    </a>
    <a href="#/history" class="nav-link" data-route="/history">
      <span class="nav-icon" aria-hidden="true">☰</span>
      <span class="nav-label">History</span>
    </a>
    <a href="#/doctor" class="nav-link" data-route="/doctor">
      <span class="nav-icon" aria-hidden="true">⊕</span>
      <span class="nav-label">Summary</span>
    </a>
    <a href="#/settings" class="nav-link" data-route="/settings">
      <span class="nav-icon" aria-hidden="true">⚙</span>
      <span class="nav-label">Settings</span>
    </a>
  </nav>

  <!-- Toast container -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js', { scope: './' }).catch(() => {});
    }
  </script>
</body>
</html>
